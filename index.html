<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Corner — Friday, July 10, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --panel:#ffffff; --card:#fbfdff; --ink:#1e2733; --muted:#5c6b7d;
    --navy:#123a63; --blue:#1c6cb5; --blue-2:#3f93da; --blue-bg:#eaf3fb; --line:#d9e5f1;
    --teal:#127c72; --teal-bg:#e4f4f1; --green:#3a9d5a;
    --shadow:18,52,99;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:15.5px;line-height:1.55;
    background:
      radial-gradient(circle at 1px 1px, rgba(28,108,181,.09) 1px, transparent 0) 0 0/22px 22px,
      linear-gradient(180deg,#eef4fb,#e7eff8);
    background-attachment:fixed;padding:34px 18px 64px}
  .wrap{max-width:1060px;margin:0 auto}
  h1,h2,h3,.brand{font-family:"Space Grotesk",Inter,sans-serif}
  .mono{font-family:"JetBrains Mono",monospace}

  /* HERO */
  .hero{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:20px;
    padding:28px 32px 30px;overflow:hidden;box-shadow:0 12px 36px rgba(var(--shadow),.12)}
  .hero::before{content:"";position:absolute;inset:0 0 auto 0;height:5px;
    background:linear-gradient(90deg,var(--navy),var(--blue),var(--blue-2),var(--navy))}
  .hero::after{content:"";position:absolute;right:-70px;top:-70px;width:260px;height:260px;border-radius:50%;
    background:radial-gradient(circle,rgba(63,147,218,.20),transparent 70%);pointer-events:none}
  .toprow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .brand{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--blue);font-weight:700;
    display:flex;align-items:center;gap:9px}
  .brand .spark{width:20px;height:20px;display:grid;place-items:center;color:#fff;border-radius:6px;
    background:linear-gradient(135deg,var(--navy),var(--blue-2))}
  .live{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--green);font-weight:600;
    display:flex;align-items:center;gap:7px;background:#e9f6ee;border:1px solid #cfe9d7;padding:4px 10px;border-radius:20px}
  .live .beacon{width:8px;height:8px;border-radius:50%;background:var(--green);position:relative}
  .live .beacon::after{content:"";position:absolute;inset:0;border-radius:50%;background:var(--green);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}70%{transform:scale(3);opacity:0}100%{opacity:0}}
  h1{font-size:33px;line-height:1.1;margin:16px 0 6px;letter-spacing:-.015em}
  h1 .accent{color:var(--blue);background:linear-gradient(90deg,var(--blue),var(--blue-2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .datestrip{color:var(--muted);font-size:13px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .datestrip .chip{background:var(--blue-bg);border:1px solid var(--line);border-radius:6px;padding:2px 8px;color:var(--navy)}

  /* SIGNAL */
  .signal{margin-top:20px;background:linear-gradient(180deg,#f5faff,#ffffff);border:1px solid var(--line);
    border-radius:16px;padding:20px 24px;box-shadow:0 3px 12px rgba(var(--shadow),.06)}
  .signal .lbl{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--blue);font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .signal p{margin:0}

  /* AT A GLANCE */
  .glancewrap{margin-top:22px}
  .glancehead{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--navy);font-weight:600;margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .glance{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px}
  .glance a{display:flex;gap:10px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);
    border-left:3px solid var(--blue);border-radius:10px;padding:11px 14px;color:var(--ink);
    text-decoration:none;font-size:14px;transition:transform .14s,box-shadow .14s,border-color .14s}
  .glance a:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(var(--shadow),.1);border-left-color:var(--blue-2)}
  .glance a .num{font-family:"JetBrains Mono",monospace;color:var(--blue);font-weight:600;font-size:12px;margin-top:1px}
  .glance a b{font-weight:600}

  /* DROPDOWN CATEGORIES */
  details.cat{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;
    box-shadow:0 2px 10px rgba(var(--shadow),.05);overflow:hidden}
  details.cat>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:15px 20px;
    transition:background .14s}
  details.cat>summary:hover{background:#f4f9ff}
  details.cat>summary::-webkit-details-marker{display:none}
  summary .ico{width:30px;height:30px;flex:none;display:grid;place-items:center;border-radius:9px;
    background:var(--blue-bg);color:var(--blue);border:1px solid #cfe0f2}
  summary h2{font-size:15.5px;margin:0;font-weight:600}
  summary .teaser{color:var(--muted);font-size:12.5px;margin-left:auto;text-align:right}
  summary .chev{flex:none;color:var(--blue);transition:transform .2s;margin-left:10px}
  details[open]>summary .chev{transform:rotate(180deg)}
  details[open]>summary{border-bottom:1px solid var(--line)}
  .catbody{padding:16px 20px 18px}
  .catnote{color:var(--muted);font-size:12.5px;margin:0 0 12px}
  .items{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
  .item{border:1px solid var(--line);border-radius:11px;padding:13px 15px;background:var(--card);
    transition:transform .14s,box-shadow .14s,border-color .14s}
  .item:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(var(--shadow),.09);border-color:#c3d8ee}
  .tagrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
  .pill{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.04em;text-transform:uppercase;
    font-weight:600;color:#1a5793;background:#e9f1fb;border:1px solid #cfe0f2;border-radius:6px;padding:3px 8px}
  .name{font-size:16px;font-weight:600;margin:0}
  .body{margin:0;color:#2c3744;font-size:14.5px}
  .why{margin:9px 0 0;display:flex;gap:8px;align-items:flex-start;font-size:13px;
    background:var(--blue-bg);border:1px solid #d5e6f6;border-radius:9px;padding:8px 11px;color:var(--navy)}
  .why svg{flex:none;margin-top:2px}
  .why b{font-weight:600}

  /* WATCHLIST */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
  .mini{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 15px;
    border-top:3px solid var(--blue);transition:transform .14s,box-shadow .14s}
  .mini:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(var(--shadow),.09)}
  .mini.watch{border-top-color:var(--blue-2)}
  .mini .lbl{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    font-weight:600;color:var(--blue);margin-bottom:5px}
  .mini p{margin:0;font-size:13.5px}

  /* WHAT WE'RE DOING (teal) */
  details.us{border-color:#bfe3dd}
  details.us>summary .ico{background:var(--teal-bg);color:var(--teal);border-color:#bfe3dd}
  details.us>summary .chev{color:var(--teal)}
  details.us .item .why{background:var(--teal-bg);border-color:#bfe3dd;color:#0f5f57}
  details.us .item .pill{color:#0f5f57;background:var(--teal-bg);border-color:#bfe3dd}
  details.us[open]>summary{border-bottom-color:#d6ede9}

  /* SOURCES / FOOTER */
  .sources{margin-top:26px;padding:16px 18px;background:#f2f7fd;border:1px solid var(--line);border-radius:12px;
    color:var(--muted);font-size:11.5px;line-height:1.7}
  .sources b{color:var(--blue)}
  .foot{margin-top:16px;text-align:center;color:var(--muted);font-size:11px;font-family:"JetBrains Mono",monospace}
  a.inline{color:var(--blue);text-decoration:none;border-bottom:1px solid transparent}
  a.inline:hover{border-color:var(--blue)}
  @media(max-width:560px){h1{font-size:26px}summary .teaser{display:none}}
</style>
</head>
<body>
<div class="wrap">

  <!-- HERO -->
  <header class="hero">
    <div class="toprow">
      <div class="brand"><span class="spark"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.2 6.2L20 10l-5.8 1.8L12 18l-2.2-6.2L4 10l5.8-1.8z"/></svg></span>Tech Corner</div>
      <div class="live"><span class="beacon"></span>Updated weekly</div>
    </div>
    <h1>The pharma sales-training <span class="accent">tech landscape</span></h1>
    <div class="datestrip"><span class="chip mono">Fri · Jul 10 · 2026</span><span>What's moving in the space — and what we're putting to work. Tap a section to expand.</span></div>
  </header>
